name: Quality Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content schema
        run: npm run validate:content

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
