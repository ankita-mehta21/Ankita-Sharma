name: Quality Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Full quality gate
        run: npm run check
