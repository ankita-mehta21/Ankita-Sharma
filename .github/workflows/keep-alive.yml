name: Keep Render Instance Active

on:
  schedule:
    # Run every 10 minutes to keep Render instance active
    # Render free tier spins down after ~15 minutes of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Ping Render Instance
        run: |
          echo "Pinging Render instance to keep it active..."
          curl -f -s -S \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            -H "User-Agent: GitHub-Actions-KeepAlive/1.0" \
            https://clinic-sample-1.onrender.com/ > /dev/null
          
          if [ $? -eq 0 ]; then
            echo "✅ Successfully pinged Render instance"
          else
            echo "⚠️ Ping failed, but continuing..."
            exit 0  # Don't fail the workflow if ping fails
          fi

